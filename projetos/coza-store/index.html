<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Coza Store</title>
</head>
<body>
    
    <header>
        <div class="interface">
            <div class="lgoo">
                <img src="img/logo.jpg" alt="Coza Store">
            </div>
            <div class="btns-action">
                <div class="btn-action search"><i class="bi bi-search"></i></div>
                <div class="btn-action cart"><i class="bi bi-cart-fill"></i></div>
            </div>
        </div>
    </header>

    <main>

        <section class="home">
            <div class="slider">
                <div class="interface">

                    <div class="slider-container">

                        <div class="slide active">
                            <img src="img/slide1.jpg" alt="" class="banner">
                            <div class="text">
                                <p class="top-title">Coleção Masculina 2030</p>
                                <h1>Novidades</h1>
                                <button class="btn-call-to-action">Compre agora</button>
                            </div>
                        </div>
                        <div class="slide">
                            <img src="img/slide2.jpeg" alt="" class="banner">
                            <div class="text">
                                <p class="top-title">Coleção Feminina 2030</p>
                                <h1>Nova Temporada</h1>
                                <button class="btn-call-to-action">Compre agora</button>
                            </div>
                        </div>
                        <div class="slide">
                            <img src="img/slide3.jpg" alt="" class="banner">
                            <div class="text">
                                <p class="top-title">Moda Masculina: Nova Coleção</p>
                                <h1>Jaquetas & Casacos</h1>
                                <button class="btn-call-to-action">Compre agora</button>
                            </div>
                        </div>

                    </div>

                    <div class="nav-arrow">
                        <button class="btn-prev"><i class="bi bi-caret-left-fill"></i></button>
                        <button class="btn-next"><i class="bi bi-caret-right-fill"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <section class="collections">
            <div class="interface">
                <div class="card-category">
                    <div class="overlay"><a href="#">Compre agora</a></div>
                    <img src="img/ads1.jpg" alt="" class="capa">
                    <div class="text">
                        <h2>Feminino</h2>
                        <p class="bottom-title">Primavera 2030</p>
                    </div>
                </div>
                <div class="card-category">
                    <div class="overlay"><a href="#">Compre agora</a></div>
                    <img src="img/ads2.jpg" alt="" class="capa">
                    <div class="text">
                        <h2>Masculino</h2>
                        <p class="bottom-title">Primavera 2030</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
